name: next

on:
  push:
    branches:
      - main
      - ci
      - release-*
    tags:
      - v*
  pull_request:
    branches:
      - main
      - ci
      - release-*
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Disable cache'
        required: true
        type: boolean

jobs:
  build-push:
    permissions:
      packages: write
    runs-on:
      - self-hosted
      - pkgs
    steps:
      -
        name: gather-system-info
        id: system-info
        uses: kenchan0130/actions-system-info@v1.3.0
        continue-on-error: true
      -
        name: print-system-info
        run: |
          MEMORY_GB=$((${{ steps.system-info.outputs.totalmem }}/1024/1024/1024))

          OUTPUTS=(
            "CPU Core: ${{ steps.system-info.outputs.cpu-core }}"
            "CPU Model: ${{ steps.system-info.outputs.cpu-model }}"
            "Hostname: ${{ steps.system-info.outputs.hostname }}"
            "NodeName: ${NODE_NAME}"
            "Kernel release: ${{ steps.system-info.outputs.kernel-release }}"
            "Kernel version: ${{ steps.system-info.outputs.kernel-version }}"
            "Name: ${{ steps.system-info.outputs.name }}"
            "Platform: ${{ steps.system-info.outputs.platform }}"
            "Release: ${{ steps.system-info.outputs.release }}"
            "Total memory: ${MEMORY_GB} GB"
          )

          for OUTPUT in "${OUTPUTS[@]}";do
            echo "${OUTPUT}"
          done
        continue-on-error: true
      -
        name: Checkout
        run: |
          git clone https://codeberg.org/stagex/stagex.git $GITHUB_WORKSPACE
          cd $GITHUB_WORKSPACE
          git checkout 2025.02.0
      -
        name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          append: |
            - endpoint: tcp://buildkit-arm64.ci.svc.cluster.local:1234
              platforms: linux/arm64
          driver: remote
          endpoint: tcp://buildkit-amd64.ci.svc.cluster.local:1234
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch diffutils
        run: |
          python3 ./src/fetch.py diffutils
      - name: Build diffutils
        run: |
          make registry-core-diffutils PROGRESS=plain BUILDER="docker buildx" ${{ inputs.no_cache && 'NOCACHE=1' || '' }} PLATFORM=linux/amd64,linux/arm64 REGISTRY_USERNAME=ghcr.io/siderolabs/stagex
      - name: Fetch go
        run: |
          python3 ./src/fetch.py go
      - name: Build go
        run: |
          make registry-core-go PROGRESS=plain BUILDER="docker buildx" ${{ inputs.no_cache && 'NOCACHE=1' || '' }} PLATFORM=linux/amd64,linux/arm64 REGISTRY_USERNAME=ghcr.io/siderolabs/stagex
