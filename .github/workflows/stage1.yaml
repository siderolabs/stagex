name: stage1

on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Disable cache'
        required: true
        type: boolean

jobs:
  build-push:
    permissions:
      packages: write
    runs-on:
      - self-hosted
      - pkgs
    services:
      buildkitd:
        image: moby/buildkit:v0.18.2
        options: --privileged
        ports:
          - 1234:1234
        volumes:
          - /var/lib/buildkit/${{ github.repository }}:/var/lib/buildkit
          - /usr/etc/buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml
    steps:
      -
        name: gather-system-info
        id: system-info
        uses: kenchan0130/actions-system-info@v1.3.0
        continue-on-error: true
      -
        name: print-system-info
        run: |
          MEMORY_GB=$((${{ steps.system-info.outputs.totalmem }}/1024/1024/1024))

          OUTPUTS=(
            "CPU Core: ${{ steps.system-info.outputs.cpu-core }}"
            "CPU Model: ${{ steps.system-info.outputs.cpu-model }}"
            "Hostname: ${{ steps.system-info.outputs.hostname }}"
            "NodeName: ${NODE_NAME}"
            "Kernel release: ${{ steps.system-info.outputs.kernel-release }}"
            "Kernel version: ${{ steps.system-info.outputs.kernel-version }}"
            "Name: ${{ steps.system-info.outputs.name }}"
            "Platform: ${{ steps.system-info.outputs.platform }}"
            "Release: ${{ steps.system-info.outputs.release }}"
            "Total memory: ${MEMORY_GB} GB"
          )

          for OUTPUT in "${OUTPUTS[@]}";do
            echo "${OUTPUT}"
          done
        continue-on-error: true
      - name: Install Python 3.11
        run: |
          sudo apt update
          sudo apt install -y python3.11
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 1
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://127.0.0.1:1234
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore stage1 cache
        id: restore-stage1
        uses: actions/cache/restore@v4
        with:
          path: fetch/bootstrap/stage1
          key: ${{ hashFiles('packages/bootstrap/stage1/package.toml') }}
      - name: Fetch stage1
        run: |
          python3 ./src/fetch.py stage1
      - name: Save stage1 cache
        id: save-stage1
        uses: actions/cache/save@v4
        with:
          path: fetch/bootstrap/stage1
          key: ${{ hashFiles('packages/bootstrap/stage1/package.toml') }}
      - name: Build stage1
        run: |
          make registry-bootstrap-stage1 PROGRESS=plain BUILDER="docker buildx" ${{ inputs.no_cache && 'NOCACHE=1' || '' }} REGISTRY_USERNAME=ghcr.io/siderolabs/stagex
