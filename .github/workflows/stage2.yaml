name: stage2

on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Disable cache'
        required: true
        type: boolean

jobs:
  build-push:
    permissions:
      packages: write
    runs-on:
      - self-hosted
      - pkgs
    steps:
      -
        name: gather-system-info
        id: system-info
        uses: kenchan0130/actions-system-info@v1.3.0
        continue-on-error: true
      -
        name: print-system-info
        run: |
          MEMORY_GB=$((${{ steps.system-info.outputs.totalmem }}/1024/1024/1024))

          OUTPUTS=(
            "CPU Core: ${{ steps.system-info.outputs.cpu-core }}"
            "CPU Model: ${{ steps.system-info.outputs.cpu-model }}"
            "Hostname: ${{ steps.system-info.outputs.hostname }}"
            "NodeName: ${NODE_NAME}"
            "Kernel release: ${{ steps.system-info.outputs.kernel-release }}"
            "Kernel version: ${{ steps.system-info.outputs.kernel-version }}"
            "Name: ${{ steps.system-info.outputs.name }}"
            "Platform: ${{ steps.system-info.outputs.platform }}"
            "Release: ${{ steps.system-info.outputs.release }}"
            "Total memory: ${MEMORY_GB} GB"
          )

          for OUTPUT in "${OUTPUTS[@]}";do
            echo "${OUTPUT}"
          done
        continue-on-error: true
      -
        name: Checkout
        run: |
          git clone https://codeberg.org/stagex/stagex.git $GITHUB_WORKSPACE
          cd $GITHUB_WORKSPACE
          git checkout 2025.07.0
      -
        name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkit-amd64.ci.svc.cluster.local:1234
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore stage2 cache
        id: restore-stage2
        uses: actions/cache/restore@v4
        with:
          path: fetch/bootstrap/stage2
          key: ${{ hashFiles('packages/bootstrap/stage2/package.toml') }}
      - name: Fetch stage2
        run: |
          python3 ./src/fetch.py stage2
      - name: Save stage2 cache
        id: save-stage2
        uses: actions/cache/save@v4
        with:
          path: fetch/bootstrap/stage2
          key: ${{ hashFiles('packages/bootstrap/stage2/package.toml') }}
      - name: Build stage2
        run: |
          make registry-bootstrap-stage2 PROGRESS=plain BUILDER="docker buildx" ${{ inputs.no_cache && 'NOCACHE=1' || '' }} REGISTRY_USERNAME=ghcr.io/siderolabs/stagex
