---
kind: auto.CI
spec:
  compileGHWorkflowsOnly: true
---
kind: common.Repository
spec:
  mainBranch: ci
  enableConform: true
---
kind: common.GHWorkflow
spec:
  workflowOptions:
    on:
      pull_request:
        branches:
          - ci
      workflow_dispatch:
        inputs:
          stagex_git_ref:
            description: 'The git ref of the stagex repository to checkout (branch, tag, sha). Defaults to staging.'
            required: false
            default: 'staging'
  jobs:
    - name: default
      buildxOptions:
        enabled: true
      runnerGroup: large
      steps:
        - name: Clone stagex
          nonMakeStep: true
          command: git clone https://codeberg.org/stagex/stagex.git _out/stagex --depth 1 -b ${{ inputs.stagex_git_ref || 'staging' }} && cd _out/stagex && git log -n 1
        - name: Patch stagex
          nonMakeStep: true
          command: patch -d _out/stagex -p1 < tag.patch &&
            patch -d _out/stagex -p1 < ttl.sh.patch &&
            patch -d _out/stagex -p1 < 0001-fix-targets-also-skip-empty-fetch-directories-in-reg.patch &&
            patch -d _out/stagex -p1 < 0002-feat-bootstrap-Go-in-core.patch &&
            patch -d _out/stagex -p1 < 0003-fix-make-stage3-cross-compile-for-linux-arm64-again.patch &&
            patch -d _out/stagex -p1 < 0004-fix-core-llvm-fix-building-on-linux-arm64.patch
        # - name: Download build dependencies
        #   nonMakeStep: true
        #   # command: cd _out/stagex && python3 ./src/fetch.py stage0 stage1 stage2 stage3
        #   command: cd _out/stagex && python3 ./src/fetch.py filesystem go mimalloc musl llvm libzstd busybox make zlib pkgconf samurai linux-headers perl openssl cmake attr libucontext onetbb mold binutils diffutils
        - name: login-to-registry
          conditions:
            - except-pull-request
          registryLoginStep:
            registry: ghcr.io
        - name: stage0
          arguments:
            - -e
            - -C
            - _out/stagex
          environment:
            PROGRESS: plain
            BUILDER: "docker buildx"
            REGISTRY_USERNAME: "${{ github.event_name != 'pull_request' && 'ghcr.io' || 'registry.dev.siderolabs.io' }}/${{ github.repository_owner }}/stagex"
            TAG: ${{ inputs.stagex_git_ref || 'staging' }}
          command: registry-bootstrap-stage0
        - name: stage1
          arguments:
            - -e
            - -C
            - _out/stagex
          environment:
            PROGRESS: plain
            BUILDER: "docker buildx"
            REGISTRY_USERNAME: "${{ github.event_name != 'pull_request' && 'ghcr.io' || 'registry.dev.siderolabs.io' }}/${{ github.repository_owner }}/stagex"
            TAG: ${{ inputs.stagex_git_ref || 'staging' }}
          command: registry-bootstrap-stage1
        - name: stage2
          arguments:
            - -e
            - -C
            - _out/stagex
          environment:
            PROGRESS: plain
            BUILDER: "docker buildx"
            REGISTRY_USERNAME: "${{ github.event_name != 'pull_request' && 'ghcr.io' || 'registry.dev.siderolabs.io' }}/${{ github.repository_owner }}/stagex"
            TAG: ${{ inputs.stagex_git_ref || 'staging' }}
          command: registry-bootstrap-stage2
        - name: stage3
          arguments:
            - -e
            - -C
            - _out/stagex
          environment:
            PLATFORM: linux/amd64,linux/arm64
            PROGRESS: plain
            BUILDER: "docker buildx"
            REGISTRY_USERNAME: "${{ github.event_name != 'pull_request' && 'ghcr.io' || 'registry.dev.siderolabs.io' }}/${{ github.repository_owner }}/stagex"
            TAG: ${{ inputs.stagex_git_ref || 'staging' }}
