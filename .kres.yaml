---
kind: auto.CI
spec:
  compileGHWorkflowsOnly: true
---
kind: common.Repository
spec:
  mainBranch: ci
  enableConform: true
---
kind: common.GHWorkflow
spec:
  workflowOptions:
    on:
      pull_request:
        branches:
          - ci
      workflow_dispatch:
        inputs:
          stagex_git_ref:
            description: "StageX git ref to checkout (branch, tag, sha). Leave empty to use the STAGEX_REF pinned in the Makefile."
            required: false
  jobs:
    - name: default
      timeoutMinutes: 720
      buildxOptions:
        enabled: true
        crossBuilder: true
      runnerGroup: large
      # All build logic lives in the Makefile; the steps below only invoke its
      # targets. The StageX version is pinned once via STAGEX_REF in the
      # Makefile and overridden here only when the workflow is dispatched with
      # an explicit ref.
      steps:
        # stage3 and go bootstrap from an i386 base and cross-compile; their
        # arm64 output must build on the amd64 node (native i386 bootstrap), not
        # emulated on the arm64 node. This dedicated amd64-only builder is
        # selected for those targets via CROSS_BUILDER_NAME in the Makefile.
        - name: Set up amd64 cross-compile builder
          nonMakeStep: true
          command: docker buildx create --name stagex-amd64 --driver remote --platform linux/amd64,linux/arm64 tcp://buildkit-amd64.ci.svc.cluster.local:1234
        - name: Clone stagex
          command: clone
          environment:
            STAGEX_REF: &stagex_ref ${{ inputs.stagex_git_ref }}
        - name: Patch stagex
          command: patch
        - name: login-to-registry
          conditions:
            - except-pull-request
          registryLoginStep:
            registry: ghcr.io
        - name: stage0
          command: stage0
          environment: &build_env
            PROGRESS: plain
            REGISTRY_USERNAME: "${{ github.event_name != 'pull_request' && 'ghcr.io' || 'registry.dev.siderolabs.io' }}/${{ github.repository_owner }}/stagex"
            STAGEX_REF: *stagex_ref
            CROSS_BUILDER_NAME: stagex-amd64
        - name: stage1
          command: stage1
          environment: *build_env
        - name: stage2
          command: stage2
          environment: *build_env
        - name: stage3
          command: stage3
          environment: *build_env
        # The core packages are built as a single step: the Makefile builds the
        # full dependency closure in topological order (each registry-* build
        # pulls its dependencies from the registry).
        - name: core
          command: core
          environment: *build_env
